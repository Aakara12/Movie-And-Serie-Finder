<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie & Series Finder 2.0</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0f1a;
    color: white;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    background: #111827;
}

.logo {
    color: #e50914;
    font-size: 22px;
    font-weight: bold;
}

input {
    padding: 8px;
    border-radius: 5px;
    border: none;
    width: 220px;
}

button {
    background: #e50914;
    border: none;
    color: white;
    padding: 8px 10px;
    border-radius: 5px;
    cursor: pointer;
    margin-left: 5px;
}

/* FEATURED */
.featured {
    height: 250px;
    background: linear-gradient(to right, #111, #222);
    display: flex;
    align-items: center;
    padding: 20px;
}

/* CATEGORY */
.category {
    margin: 20px;
}

.row {
    display: flex;
    overflow-x: auto;
    gap: 10px;
    padding: 10px;
}

/* CARD */
.card {
    min-width: 160px;
    background: #1f2937;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.1);
}

.card img {
    width: 100%;
    height: 230px;
    object-fit: cover;
    border-radius: 10px 10px 0 0;
}

.card p {
    text-align: center;
    margin: 8px;
}

/* POPUP */
#popup {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
}

.popup-content {
    background: #111827;
    width: 90%;
    max-width: 500px;
    margin: 8% auto;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
}

.popup-content img {
    width: 100%;
    border-radius: 10px;
}
</style>
</head>

<body>

<header>
    <div class="logo">🎬 Movie Finder 2.0</div>

    <div>
        <input id="search" placeholder="Search...">
        <button onclick="randomPick()">🎲 Random</button>
    </div>
</header>

<div class="featured">
    <div>
        <h2>🔥 Featured Picks</h2>
        <p>Find your next movie or series</p>
    </div>
</div>

<div id="content"></div>

<!-- POPUP -->
<div id="popup">
    <div class="popup-content">
        <img id="pimg">
        <h2 id="ptitle"></h2>
        <p id="pdesc"></p>
        <button onclick="closePopup()">Close</button>
    </div>
</div>
<script>
const data = [
{
category: "🌍 Anime",
items: [
"Naruto","Attack on Titan","Demon Slayer","One Piece","Death Note",
"Jujutsu Kaisen","Tokyo Ghoul","Bleach","Chainsaw Man","Hunter x Hunter",
"Spy x Family","Fullmetal Alchemist"
]
},
{
category: "🧠 Sci-Fi",
items: [
"Interstellar","The Matrix","Tenet","Blade Runner 2049","Gravity",
"The Martian","Arrival","Ex Machina","Black Mirror"
]
},
{
category: "🔥 Action / Thriller",
items: [
"Avengers: Endgame","Spider-Man: No Way Home","John Wick","The Batman",
"Inception","Fast & Furious","Mission: Impossible – Fallout","Mad Max: Fury Road",
"The Dark Knight","Die Hard"
]
},
{
category: "🦸 Marvel / Superheroes",
items: [
"Black Panther","Doctor Strange","Thor: Ragnarok","Guardians of the Galaxy",
"Justice League","Man of Steel","Captain America: Civil War","Iron Man",
"Venom","Aquaman","Loki","The Boys","Wednesday"
]
},
{
category: "😂 Comedy",
items: [
"Superbad","The Hangover","Deadpool","Home Alone","Jumanji",
"Friends","How I Met Your Mother","Brooklyn Nine-Nine","The Office",
"Modern Family","White Chicks","Mean Girls","21 Jump Street","Ted"
]
},
{
category: "❤️ Romance",
items: [
"The Notebook","Titanic","La La Land","To All the Boys I've Loved Before",
"After","Crazy Rich Asians","Gossip Girl","Vampire Diaries"
]
},
{
category: "🎭 Drama / Thriller",
items: [
"Stranger Things","Pretty Little Liars","Vampire Diaries","Gossip Girl",
"Breaking Bad","Money Heist","Dark","Ozark","The Witcher",
"Prison Break","Dexter","Peaky Blinders","Sherlock","Mindhunter"
]
},
{
category: "🧭 Adventure / Fantasy",
items: [
"Harry Potter","The Lord of the Rings","The Hobbit","Avatar",
"The Hunger Games","Pirates of the Caribbean","Shrek","Madagascar",
"Kung Fu Panda","Moana","Frozen","Luca","Coco"
]
}
];

/* RENDER */
function render() {
let container = document.getElementById("content");
container.innerHTML = "";

data.forEach(section => {
let html = `<div class="category"><h2>${section.category}</h2><div class="row">`;

section.items.forEach(item => {
html += `
<div class="card" onclick="openPopup('${item}','Great movie or series to watch!','https://via.placeholder.com/300x450')">
<img src="https://via.placeholder.com/300x450">
<p>${item}</p>
</div>
`;
});

html += "</div></div>";
container.innerHTML += html;
});
}

/* POPUP */
function openPopup(title, desc, img) {
document.getElementById("popup").style.display = "block";
document.getElementById("ptitle").innerText = title;
document.getElementById("pdesc").innerText = desc;
document.getElementById("pimg").src = img;
}

function closePopup() {
document.getElementById("popup").style.display = "none";
}

/* RANDOM */
function randomPick() {
let all = [];
data.forEach(c => all.push(...c.items));

let pick = all[Math.floor(Math.random()*all.length)];
openPopup(pick, "🔥 Random pick just for you!", "https://via.placeholder.com/300x450");
}

/* SEARCH */
document.getElementById("search").addEventListener("input", function(e){
let val = e.target.value.toLowerCase();

document.querySelectorAll(".card").forEach(card => {
card.style.display = card.innerText.toLowerCase().includes(val) ? "block" : "none";
});
});

let featured = [
"Stranger Things",
"Interstellar",
"Avengers: Endgame",
"Naruto",
"Breaking Bad"
];

setInterval(() => {
let pick = featured[Math.floor(Math.random()*featured.length)];
document.querySelector(".featured h2").innerText = "🔥 " + pick;
}, 4000);

render();
</script>

</body>
</html>
