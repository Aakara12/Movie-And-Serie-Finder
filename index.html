<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie & Series Finder 2.0</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0f1a;
    color: white;
}

<header>
    <div class="logo">🎬 Movie Finder 2.0</div>

    <div style="display:flex; align-items:center; gap:10px;">
        <input id="search" placeholder="Search movies & series...">
        <button onclick="randomPick()">🎲 Random</button>
    </div>
</header>

.logo {
    color: #e50914;
    font-size: 22px;
    font-weight: bold;
}

input {
    padding: 8px;
    border-radius: 5px;
    border: none;
    width: 220px;
}

button {
    background: #e50914;
    border: none;
    color: white;
    padding: 8px 10px;
    border-radius: 5px;
    cursor: pointer;
    margin-left: 5px;
}

/* FEATURED */
.featured {
    height: 250px;
    background: linear-gradient(to right, #111, #222);
    display: flex;
    align-items: center;
    padding: 20px;
}

/* CATEGORY */
.category {
    margin: 20px;
}

.row {
    display: flex;
    overflow-x: auto;
    gap: 10px;
    padding: 10px;
}

/* CARD */
.card {
    min-width: 160px;
    background: #1f2937;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.1);
}

.card img {
    width: 100%;
    height: 230px;
    object-fit: cover;
    border-radius: 10px 10px 0 0;
}

.card p {
    text-align: center;
    margin: 8px;
}

/* POPUP */
#popup {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
}

.popup-content {
    background: #111827;
    width: 90%;
    max-width: 500px;
    margin: 8% auto;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
}

.popup-content img {
    width: 100%;
    border-radius: 10px;
}
</style>
</head>

/* POPUP */
function openPopup(title, desc, img) {
document.getElementById("popup").style.display = "block";
document.getElementById("ptitle").innerText = title;
document.getElementById("pdesc").innerText = desc;
document.getElementById("pimg").src = img;
}

function closePopup() {
document.getElementById("popup").style.display = "none";
}

/* RANDOM */
function randomPick() {
let all = [];
data.forEach(c => all.push(...c.items));

let pick = all[Math.floor(Math.random()*all.length)];
openPopup(pick, "🔥 Random pick just for you!", "https://via.placeholder.com/300x450");
}

/* SEARCH */
document.getElementById("search").addEventListener("input", function(e){
let val = e.target.value.toLowerCase();

document.querySelectorAll(".card").forEach(card => {
card.style.display = card.innerText.toLowerCase().includes(val) ? "block" : "none";
});
});

let featured = [

"Breaking Bad"
];

setInterval(() => {
let pick = featured[Math.floor(Math.random()*featured.length)];
document.querySelector(".featured h2").innerText = "🔥 " + pick;
}, 4000);
